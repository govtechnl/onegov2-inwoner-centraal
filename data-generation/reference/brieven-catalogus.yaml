# Brieven-catalogus
#
# Stable letter archetypes per organisation. Each entry is the source of
# truth used by both the correspondence-stream generator (layer 4) and the
# reference timeline (layer 5).
#
# Sources:
#   - resources/Bijlage-3-correspondentie-nabestaanden.pdf
#     (Aanpak Levensgebeurtenissen, BZK 2025 — inventarisatie 12 organisaties)
#   - resources/Situatie-Truus.pptx (per-organisation letter inventory)
#
# Field meanings:
#   code:                          stable identifier; appears as `brief_code`
#   organisatie:                   one of organisaties.yaml
#   omschrijving:                  human-readable label
#   type:                          one of [informatiebrief, actiebrief,
#                                          factuur, aanmaning, condoleance,
#                                          beschikking, terugvordering]
#   timing.dag_min/dag_max:        days after death the letter typically arrives
#   aanhef_huidig:                 today's salutation (often "Aan de erven van")
#   geadresseerde:                 [overledene | erven | partner | contactpersoon]
#   adres_huidig:                  where the letter typically lands today
#   actie_vereist:                 boolean
#   actie_omschrijving:            null or short description
#   wettelijke_reactietermijn_dagen: null or integer
#   voorwaarden:                   list of conditions when the letter is sent
#   bron_documenten:               reference identifiers from the source pptx/pdf

